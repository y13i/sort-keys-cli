name: publish
on:
  release:
    types:
      - published
permissions:
  id-token: write
  contents: read
  packages: write
jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: false
      - run: devbox run -- pnpm ci
      - run: devbox run -- pnpm publish --no-git-checks --access=public
  publish-docker:
    uses: y13i/actions/.github/workflows/docker.yml@main
    secrets:
      dockerhub-access-token: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
