name: check
on:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
      - run: devbox run -- pnpm install --frozen-lockfile
      - run: devbox run -- pnpm exec biome check
